database:
  path: ~/.config/watcher/watcher.db
display:
  # Timezone used for CLI output, stdout logs, reports and emails. Stored timestamps remain UTC.
  timezone: "+08:00"
scheduler:
  interval_minutes: 360
probe:
  connect_timeout_ms: 2000
  http_timeout_ms: 8000
  per_target_delay_ms: 1200
  # General concurrency for non-port tasks such as fingerprinting and web checks.
  concurrency: 16
  # Port scan concurrency is controlled by IP count and per-IP port count.
  # Effective port scan parallelism = scan_ip_concurrency * scan_port_concurrency_per_ip.
  scan_ip_concurrency: 4
  scan_port_concurrency_per_ip: 4
  # Empty dns_servers means using the host/system DNS resolver.
  dns_servers: []
  # Custom DNS servers are also supported:
  # dns_servers:
  #   - 8.8.8.8
  #   - 1.1.1.1:53
  scan_ports:
    - 80
    - 443
    - 8080
    - 8443
    - 22
    - 3306
  # Full-port scan is also supported:
  # scan_ports: full
fingerprint:
  detailed:
    # Detailed service fingerprinting runs after the lightweight fingerprint task,
    # in parallel with web enum and vuln scan. It requires nmap.
    enabled: false
    nmap_path: nmap
    timeout_ms: 30000
    concurrency: 2
web:
  max_paths_per_service: 200
  max_js_paths_per_service: 80
  negative_body_markers:
    - 接口不存在
    - code=404
    - '"code":404'
pocs:
  # Set each POC to enabled: false to disable it independently.
  webpack_sourcemap_disclosure:
    enabled: true
    # Bound task5 work so a large URL history or JS-heavy page cannot monopolize a batch.
    max_urls_per_batch: 1000
    max_js_files_per_url: 20
    max_map_candidates_per_url: 20
report:
  output_dir: ~/.config/watcher/reports
  # Detail format: xlsx, json, or csv. summary.md is always generated.
  format: xlsx
email:
  enabled: false
  smtp_host: smtp.qq.com
  smtp_port: 465
  # auto maps 465 to TLS/SMTPS and 587 to STARTTLS.
  smtp_security: auto
  username: ""
  password: ""
  from: ""
  to:
    - security@example.com
